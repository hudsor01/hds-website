name: Update Visual Baselines

# Manually-triggered bootstrap for the @visual Playwright suite. The
# committed baselines are macOS (`-darwin.png`); CI runs on Linux, so the
# `@visual` tests are excluded from the normal CI lane (see ci.yml e2e job /
# `test:e2e:ci`). Run this workflow once on a branch to generate Linux
# (`-linux.png`) baselines on the SAME runner image CI uses; it uploads them
# as an artifact (the repo's workflow token is read-only, so it cannot push).
# Then download the artifact, commit the baselines, and drop the `@visual`
# exclusion so visual regression runs on every push:
#
#   gh run download <run-id> -n linux-visual-baselines -D .
#   git add e2e && git commit -m "test: add Linux visual baselines" && git push
#
# Generating on the runner (not locally / a mismatched container) is
# deliberate: it guarantees the baselines match the pixels CI compares
# against, avoiding font/AA-driven flakiness.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to generate baselines from
        required: true
        default: main

permissions:
  contents: read

jobs:
  update-baselines:
    name: Generate Linux visual baselines
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Generate Linux baselines for @visual
        run: bunx playwright test --project=chromium --grep @visual --update-snapshots
        env:
          SKIP_ENV_VALIDATION: true
          NEON_AUTH_BASE_URL: https://ci-e2e-placeholder.neon.tech

      - name: Upload generated baselines
        uses: actions/upload-artifact@v4
        with:
          name: linux-visual-baselines
          path: e2e/**/*-snapshots/**
          if-no-files-found: error
          retention-days: 7
