name: Claude Code Review

# On-demand structured review via the code-review plugin. Triggered by
# commenting `@claude review` on a PR — the previous auto-on-push
# behaviour spammed runner minutes on every commit, including rebases
# and format-only changes. The companion claude.yml workflow handles
# plain `@claude` mentions for ad-hoc questions.
on:
  issue_comment:
    types: [created]

jobs:
  claude-review:
    # Only fire on PR comments (issue_comment fires for plain issues
    # too — filter on github.event.issue.pull_request being truthy)
    # whose body contains the literal "@claude review" phrase.
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

