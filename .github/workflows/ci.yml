name: CI

on:
  # Only run on push to main/develop, not feature branches
  push:
    branches: [main, develop]
  # Run on PRs to avoid duplicate runs when pushing to feature branches
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check test mock leaks
        run: bash scripts/check-test-mock-leaks.sh

      - name: Run Biome
        run: bun run lint

      - name: Run TypeScript type checking
        run: bun run typecheck

      - name: Validate blog content (R1-R9 guardrails)
        run: bun run blog:validate

      # The brand-tokens regen runs in the pre-commit hook, but hooks are
      # bypassable (--no-verify, web edits, contributors without the hook),
      # so re-derive from globals.css here and fail on drift. Keeps the
      # committed src/lib/_generated/brand.ts authoritative.
      - name: Verify brand tokens are up to date
        run: |
          bun run brand:generate
          git diff --exit-code src/lib/_generated/brand.ts

      # Code-health gate (fallow). Errors on structural rot (dead files,
      # unresolved/unlisted imports, unused deps, circular deps); unused
      # exports/types are warn-only because Next.js framework exports
      # (metadata/runtime) and intentional API surface trip them. Config:
      # .fallowrc.json. Exit 1 only on error-severity findings.
      - name: Run fallow (code health)
        run: bunx fallow@2.94.0 dead-code --quiet

  test:
    name: Test
    # macOS runner: bun's native test-runner ESM loader on Linux fails to
    # resolve drizzle-orm 0.45.2's `export *` re-export chains
    # (SyntaxError: Export named 'sql'/'asc'/... not found). The same bun
    # version resolves them fine on macOS. Unit tests are OS-agnostic logic;
    # the Build job still validates Linux. Revert to ubuntu-latest once the
    # bun Linux loader bug is fixed upstream.
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit
        env:
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Build project
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: true
          CSRF_SECRET: ci-build-dummy-secret-32-chars-long
          NEON_AUTH_BASE_URL: https://ci-build-placeholder.neon.tech
          NEON_AUTH_COOKIE_SECRET: ci-build-dummy-cookie-secret-32chars

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      # Generate throwaway secrets at runtime so no secret-shaped values are
      # committed to the workflow. The functional suite does not exercise
      # CSRF/auth/DB-write paths (those are the E2E_LIVE_BACKEND specs, which
      # run nightly in e2e-live.yml); these only satisfy module-load access.
      - name: Generate throwaway test secrets
        run: |
          {
            echo "CSRF_SECRET=$(openssl rand -hex 24)"
            echo "NEON_AUTH_COOKIE_SECRET=$(openssl rand -hex 24)"
          } >> "$GITHUB_ENV"

      # Functional suite on every push/PR with no backend: the
      # E2E_LIVE_BACKEND data-dependent specs self-skip and @visual is
      # excluded (separate Visual job / Linux baselines). The live-backend
      # lane that provisions Neon + seeds runs nightly in e2e-live.yml.
      - name: Run E2E tests
        run: bun run test:e2e:ci
        env:
          SKIP_ENV_VALIDATION: true
          NEON_AUTH_BASE_URL: https://ci-e2e-placeholder.neon.tech

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  visual:
    name: Visual
    # Visual regression runs WITHOUT a backend on purpose: the committed
    # Linux baselines were generated against no-DB (empty-state) pages, so
    # the comparison must render that same deterministic state. Running it
    # against the e2e job's live Neon data would diff on every data change.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Run visual regression
        run: bun run test:e2e:visual
        env:
          SKIP_ENV_VALIDATION: true
          NEON_AUTH_BASE_URL: https://ci-e2e-placeholder.neon.tech

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-visual
          path: playwright-report/
          retention-days: 7
