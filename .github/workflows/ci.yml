name: CI

on:
  # Only run on push to main/develop, not feature branches
  push:
    branches: [main, develop]
  # Run on PRs to avoid duplicate runs when pushing to feature branches
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check test mock leaks
        run: bash scripts/check-test-mock-leaks.sh

      - name: Run Biome
        run: bun run lint

      - name: Run TypeScript type checking
        run: bun run typecheck

      # Code-health gate (fallow). Errors on structural rot (dead files,
      # unresolved/unlisted imports, unused deps, circular deps); unused
      # exports/types are warn-only because Next.js framework exports
      # (metadata/runtime) and intentional API surface trip them. Config:
      # .fallowrc.json. Exit 1 only on error-severity findings.
      - name: Run fallow (code health)
        run: bunx fallow@2.94.0 dead-code --quiet

  test:
    name: Test
    # macOS runner: bun's native test-runner ESM loader on Linux fails to
    # resolve drizzle-orm 0.45.2's `export *` re-export chains
    # (SyntaxError: Export named 'sql'/'asc'/... not found). The same bun
    # version resolves them fine on macOS. Unit tests are OS-agnostic logic;
    # the Build job still validates Linux. Revert to ubuntu-latest once the
    # bun Linux loader bug is fixed upstream.
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run test:unit
        env:
          NODE_ENV: test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lock') }}-
            ${{ runner.os }}-nextjs-

      - name: Build project
        run: bun run build
        env:
          SKIP_ENV_VALIDATION: true
          CSRF_SECRET: ci-build-dummy-secret-32-chars-long
          NEON_AUTH_BASE_URL: https://ci-build-placeholder.neon.tech
          NEON_AUTH_COOKIE_SECRET: ci-build-dummy-cookie-secret-32chars

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      # Provision an ephemeral Neon branch (inherits the parent's schema +
      # data) so the E2E_LIVE_BACKEND data-dependent specs (blog,
      # testimonials) run instead of skipping. No RESEND_API_KEY is set, so
      # the contact route returns success in "test mode" and newsletter's
      # email is isResendConfigured()-guarded: zero emails sent.
      - name: Branch expiry (2h)
        run: echo "NEON_EXPIRES_AT=$(date -u --date '+2 hours' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.NEON_EXPIRES_AT }}

      - name: Seed the Neon branch
        env:
          SKIP_ENV_VALIDATION: true
          POSTGRES_URL: ${{ steps.neon.outputs.db_url }}
        run: bun run scripts/seed-e2e.ts

      # Generate throwaway secrets at runtime so no secret-shaped values are
      # committed to the workflow.
      - name: Generate throwaway test secrets
        run: |
          {
            echo "CSRF_SECRET=$(openssl rand -hex 24)"
            echo "NEON_AUTH_COOKIE_SECRET=$(openssl rand -hex 24)"
          } >> "$GITHUB_ENV"

      # Runs the portable functional suite against the seeded Neon branch with
      # E2E_LIVE_BACKEND=1 (data-dependent specs run) but no RESEND_API_KEY
      # (no emails). @visual stays excluded (separate Linux-baseline track).
      - name: Run E2E tests
        run: bun run test:e2e:ci
        env:
          SKIP_ENV_VALIDATION: true
          NEON_AUTH_BASE_URL: https://ci-e2e-placeholder.neon.tech
          POSTGRES_URL: ${{ steps.neon.outputs.db_url }}
          E2E_LIVE_BACKEND: '1'
          # The dev server runs on :3001; BASE_URL must match it so the
          # same-origin mutation guard (isSameOriginRequest) accepts the
          # contact/newsletter POSTs. Default is :3000 -> "Forbidden".
          BASE_URL: http://localhost:3001
          NEXT_PUBLIC_BASE_URL: http://localhost:3001

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # Always clean up the ephemeral branch so failed runs don't orphan it
      # (the 2h expiry is a backstop). Best-effort: never fail the job here.
      - name: Delete Neon branch
        if: always() && steps.neon.outcome == 'success'
        continue-on-error: true
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: e2e-ci-${{ github.run_id }}-${{ github.run_attempt }}
          api_key: ${{ secrets.NEON_API_KEY }}

  visual:
    name: Visual
    # Visual regression runs WITHOUT a backend on purpose: the committed
    # Linux baselines were generated against no-DB (empty-state) pages, so
    # the comparison must render that same deterministic state. Running it
    # against the e2e job's live Neon data would diff on every data change.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}

      - name: Install Playwright (chromium)
        run: bunx playwright install --with-deps chromium

      - name: Run visual regression
        run: bun run test:e2e:visual
        env:
          SKIP_ENV_VALIDATION: true
          NEON_AUTH_BASE_URL: https://ci-e2e-placeholder.neon.tech

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-visual
          path: playwright-report/
          retention-days: 7
