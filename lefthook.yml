# Lefthook configuration
# Documentation: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    brand-tokens:
      priority: 1
      glob: "src/app/globals.css"
      run: bun run brand:generate && git add src/lib/_generated/brand.ts
    check:
      priority: 2
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: bunx biome check --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
    typecheck:
      priority: 3
      glob: "*.{ts,tsx}"
      run: bun run typecheck

# Pre-push: heavier checks that don't need to gate every commit but
# must pass before the branch leaves the laptop. The unit suite is
# fast (~1s) and the production build catches Next.js-specific issues
# (route classification, CSP shape, edge-runtime constraints) that
# typecheck alone misses.
pre-push:
  parallel: false
  commands:
    test:
      priority: 1
      run: bun run test:unit
    build:
      priority: 2
      run: bun run build
